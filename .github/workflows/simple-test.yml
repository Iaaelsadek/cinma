name: Simple Test

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Echo test
        run: echo "Hello from GitHub Actions!"
        
      - name: Show date
        run: date
        
      - name: List files
        run: ls -la
