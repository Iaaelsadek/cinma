name: CI/CD Pipeline - Production Deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================
  # Job 1: Code Quality Checks
  # ============================================
  lint:
    name: ESLint Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true  # Don't block deployment

  # ============================================
  # Job 2: TypeScript Type Checking
  # ============================================
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript Check
        run: npm run typecheck
        continue-on-error: true  # Don't block deployment

  # ============================================
  # Job 3: Unit Tests
  # ============================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test -- --run --reporter=verbose
        continue-on-error: true  # Don't block deploy on test failures
        timeout-minutes: 10

  # ============================================
  # Job 4: Build Verification
  # ============================================
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [test]  # Only wait for tests, not lint/typecheck
    if: always()  # Run even if previous jobs fail
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate slugs
        run: npm run slugs:validate
        continue-on-error: true  # Don't block deploy if DB unreachable
        env:
          COCKROACHDB_URL: ${{ secrets.COCKROACHDB_URL }}

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          VITE_GROQ_API_KEY: ${{ secrets.VITE_GROQ_API_KEY }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_SITE_NAME: ${{ secrets.VITE_SITE_NAME }}
          VITE_DOMAIN: ${{ secrets.VITE_DOMAIN }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1

  # ============================================
  # Job 5: Deploy Frontend to Cloudflare Pages
  # ============================================
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if build succeeded
        id: check-build
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ Build failed - skipping frontend deployment"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Download build artifacts
        if: steps.check-build.outputs.skip == 'false'
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Check Cloudflare Secrets
        id: check-cloudflare
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ Cloudflare secrets not configured - skipping deployment"
          elif [ "${{ steps.check-build.outputs.skip }}" == "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ Build failed - skipping deployment"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.check-cloudflare.outputs.skip == 'false'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: cinma-online
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify deployment success
        if: steps.check-cloudflare.outputs.skip == 'false' && success()
        uses: actions/github-script@v7
        with:
          script: |
            console.log('✅ Frontend deployed successfully to Cloudflare Pages')

      - name: Notify deployment skipped
        if: steps.check-cloudflare.outputs.skip == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            console.log('⚠️ Frontend deployment skipped - Cloudflare secrets not configured')
            console.log('📚 See: docs/GITHUB_SECRETS_GUIDE.md')

  # ============================================
  # Job 6: Deploy Backend to Koyeb
  # ============================================
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: []
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Koyeb Secrets
        id: check-koyeb
        run: |
          if [ -z "${{ secrets.KOYEB_API_TOKEN }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ Koyeb secrets not configured - skipping deployment"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Koyeb
        if: steps.check-koyeb.outputs.skip == 'false'
        uses: koyeb/action-git-deploy@v1
        with:
          api-token: ${{ secrets.KOYEB_API_TOKEN }}
          service-name: cinma-backend
          # Koyeb will automatically detect and deploy from GitHub

      - name: Notify deployment success
        if: steps.check-koyeb.outputs.skip == 'false' && success()
        uses: actions/github-script@v7
        with:
          script: |
            console.log('✅ Backend deployed successfully to Koyeb')

      - name: Notify deployment skipped
        if: steps.check-koyeb.outputs.skip == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            console.log('⚠️ Backend deployment skipped - Koyeb secrets not configured')
            console.log('📚 See: docs/GITHUB_SECRETS_GUIDE.md')

  # ============================================
  # Job 7: Notify on Failure
  # ============================================
  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [build, deploy-frontend, deploy-backend]
    if: failure() && github.ref == 'refs/heads/main'
    
    steps:
      - name: Create Issue on Failure
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Deployment Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `## Deployment Failed\n\n**Workflow:** ${context.workflow}\n**Run:** ${context.runId}\n**Branch:** ${context.ref}\n**Commit:** ${context.sha}\n\n[View Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bug', 'deployment', 'ci-cd']
            })
