name: Test GitHub Actions Billing

on:
  workflow_dispatch:  # Manual trigger only
  push:
    branches: [main]
    paths:
      - '.github/workflows/test-billing.yml'

jobs:
  test-simple:
    name: Simple Test
    runs-on: ubuntu-latest
    timeout-minutes: 2
    
    steps:
      - name: Echo Hello
        run: echo "✅ GitHub Actions is working!"
        timeout-minutes: 1

      - name: Check Date
        run: date
        timeout-minutes: 1

      - name: Print Success
        run: |
          echo "🎉 Success! No billing issues detected."
          echo "GitHub Actions minutes used: ~10 seconds"
        timeout-minutes: 1

  test-node:
    name: Node.js Test
    runs-on: ubuntu-latest
    timeout-minutes: 3
    
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        timeout-minutes: 2

      - name: Check Node Version
        run: |
          echo "Node version:"
          node --version
          echo "NPM version:"
          npm --version
        timeout-minutes: 1

      - name: Print Success
        run: echo "✅ Node.js setup works!"
        timeout-minutes: 1

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-simple, test-node]
    if: always()
    timeout-minutes: 2
    
    steps:
      - name: Print Results
        run: |
          echo "================================"
          echo "GitHub Actions Billing Test"
          echo "================================"
          echo ""
          echo "Simple Test: ${{ needs.test-simple.result }}"
          echo "Node Test: ${{ needs.test-node.result }}"
          echo ""
          if [ "${{ needs.test-simple.result }}" == "success" ] && [ "${{ needs.test-node.result }}" == "success" ]; then
            echo "✅ ALL TESTS PASSED"
            echo "✅ No billing issues detected"
            echo "✅ GitHub Actions is working normally"
          else
            echo "❌ TESTS FAILED"
            echo "⚠️  Possible billing issue detected"
            echo "📚 Check: https://github.com/settings/billing"
          fi
        timeout-minutes: 1
