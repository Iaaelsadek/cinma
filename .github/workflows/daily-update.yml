name: Daily Content Update

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM daily
  workflow_dispatch:

jobs:
  update-content:
    runs-on: ubuntu-latest
    name: Fetch new content from TMDB

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary requests python-dotenv

      - name: Run content update
        run: python scripts/migration/04_daily_update.py
        env:
          COCKROACHDB_URL: ${{ secrets.COCKROACHDB_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Daily Update Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `## Daily Content Update Failed\n\n**Workflow:** ${context.workflow}\n**Run:** ${context.runId}\n\n[View Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\nCheck the logs for details.`,
              labels: ['bug', 'automation']
            })
