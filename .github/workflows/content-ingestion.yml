name: Content Ingestion

on:
  schedule:
    - cron: '0 1 * * *'  # Daily at 1 AM UTC
  workflow_dispatch:
    inputs:
      type:
        description: 'What to ingest: movies | series | all'
        required: false
        default: 'all'

jobs:
  ingest-movies:
    name: Ingest Movies
    runs-on: ubuntu-latest
    timeout-minutes: 200  # ~3.5 hours
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Movies Ingestion
        run: timeout 180m node scripts/ingestion/INGEST-MOVIES-V2.js || true
        env:
          COCKROACHDB_URL: ${{ secrets.COCKROACHDB_URL }}
          TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        timeout-minutes: 185
        continue-on-error: true

      - name: Upload movies progress files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingestion-progress-movies-${{ github.run_number }}
          path: |
            scripts/ingestion/progress-movies-v2.json
            scripts/ingestion/error-log-movies.json
          retention-days: 7

  ingest-series:
    name: Ingest Series
    runs-on: ubuntu-latest
    timeout-minutes: 200  # ~3.5 hours
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Series Ingestion
        run: timeout 180m node scripts/ingestion/INGEST-SERIES-V2.js || true
        env:
          COCKROACHDB_URL: ${{ secrets.COCKROACHDB_URL }}
          TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        timeout-minutes: 185
        continue-on-error: true

      - name: Upload series progress files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingestion-progress-series-${{ github.run_number }}
          path: |
            scripts/ingestion/progress-series-v2.json
            scripts/ingestion/error-log-series.json
          retention-days: 7
