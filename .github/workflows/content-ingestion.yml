name: Content Ingestion

on:
  schedule:
    - cron: '0 1 * * *'  # Daily at 1 AM UTC
  workflow_dispatch:
    inputs:
      type:
        description: 'What to ingest: movies | series | all'
        required: false
        default: 'all'

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 400  # ~6.5 hours total

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Movies Ingestion
        if: ${{ github.event.inputs.type != 'series' || github.event.inputs.type == '' || github.event_name == 'schedule' }}
        run: timeout 180m node scripts/ingestion/INGEST-MOVIES.js || true
        env:
          COCKROACHDB_URL: ${{ secrets.COCKROACHDB_URL }}
          TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        timeout-minutes: 185
        continue-on-error: true

      - name: Run Series Ingestion
        if: ${{ github.event.inputs.type != 'movies' || github.event.inputs.type == '' || github.event_name == 'schedule' }}
        run: timeout 180m node scripts/ingestion/INGEST-SERIES.js || true
        env:
          COCKROACHDB_URL: ${{ secrets.COCKROACHDB_URL }}
          TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        timeout-minutes: 185
        continue-on-error: true

      - name: Upload progress files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingestion-progress-${{ github.run_number }}
          path: |
            scripts/ingestion/progress-movies.json
            scripts/ingestion/progress-series.json
            scripts/ingestion/failed-pages-movies.json
            scripts/ingestion/failed-pages-series.json
          retention-days: 7
