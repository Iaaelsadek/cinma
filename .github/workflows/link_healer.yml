name: Link Healer

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 3 AM UTC
  workflow_dispatch:

jobs:
  heal-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check broken server links via API
        run: |
          node -e "
          const fetch = (...args) => import('node-fetch').then(({default: f}) => f(...args));
          async function main() {
            const base = process.env.VITE_API_BASE || 'https://api.cinma.online';
            try {
              const res = await fetch(base + '/api/link-checks?status=broken&limit=50');
              if (res.ok) {
                const data = await res.json();
                console.log('Broken links found:', data.data?.length || 0);
              }
            } catch(e) {
              console.log('API check skipped:', e.message);
            }
          }
          main();
          "
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        continue-on-error: true

      - name: Notify on completion
        if: always()
        run: echo "Link healer check completed"
