---
# Qovery Configuration for cinma.online Backend
# This file configures the deployment settings for the Node.js backend server

application:
  name: cinma-online-backend
  project: cinma-online
  organization: cinma-online-org
  
  # Build Configuration
  build:
    dockerfile_path: Dockerfile
    
  # Port Configuration
  ports:
    - name: http
      internal_port: 8080
      external_port: 443
      protocol: HTTP
      publicly_accessible: true
  
  # Health Check Configuration
  healthchecks:
    liveness_probe:
      type:
        http:
          path: /health
          scheme: HTTP
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    
    readiness_probe:
      type:
        http:
          path: /health
          scheme: HTTP
      initial_delay_seconds: 10
      period_seconds: 5
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 3
  
  # Resource Limits
  resources:
    limits:
      cpu: 1000m  # 1 CPU core
      memory: 1024Mi  # 1GB RAM
    requests:
      cpu: 500m  # 0.5 CPU core minimum
      memory: 512Mi  # 512MB RAM minimum
  
  # Auto-Scaling Configuration
  auto_scaling:
    enabled: true
    min_replicas: 1
    max_replicas: 3
    target_cpu_utilization_percentage: 70
  
  # Environment Variables (Non-Sensitive)
  environment_variables:
    - key: NODE_ENV
      value: production
    
    - key: PORT
      value: "8080"
    
    - key: HOST
      value: "0.0.0.0"
    
    - key: VITE_SITE_NAME
      value: "سينما أونلاين"
    
    - key: VITE_DOMAIN
      value: "cinma.online"
    
    - key: VITE_SITE_URL
      value: "https://cinma.online"
    
    - key: WEB_ORIGIN
      value: "https://cinma.online"
  
  # Secrets (Sensitive Data - Set in Qovery Dashboard)
  # These should be configured in Qovery Console under Environment Variables
  secrets:
    # Database
    - key: COCKROACHDB_URL
      # Value: Set in Qovery dashboard
      # Format: postgresql://user:password@host:26257/defaultdb?sslmode=verify-full
    
    # Supabase (Auth Only)
    - key: VITE_SUPABASE_URL
      # Value: Set in Qovery dashboard
      # Example: https://xxx.supabase.co
    
    - key: SUPABASE_SERVICE_ROLE_KEY
      # Value: Set in Qovery dashboard
      # This is the service role key for backend operations
    
    - key: VITE_SUPABASE_ANON_KEY
      # Value: Set in Qovery dashboard
      # This is the anon key for frontend
    
    # API Keys
    - key: API_KEY
      # Value: Set in Qovery dashboard
      # Internal API authentication key
    
    - key: VITE_TMDB_API_KEY
      # Value: Set in Qovery dashboard
      # TMDB API key for movie metadata
    
    - key: VITE_GEMINI_API_KEY
      # Value: Set in Qovery dashboard (optional)
      # Google Gemini AI API key
    
    - key: VITE_GROQ_API_KEY
      # Value: Set in Qovery dashboard (optional)
      # Groq AI API key
    
    # Admin Tokens
    - key: ADMIN_SYNC_TOKEN
      # Value: Set in Qovery dashboard
      # Token for admin synchronization
    
    - key: ADMIN_CLAIM_TOKEN
      # Value: Set in Qovery dashboard
      # Token for admin claims
    
    # Monitoring
    - key: SENTRY_DSN
      # Value: Set in Qovery dashboard (optional)
      # Sentry error tracking DSN for backend
  
  # Deployment Configuration
  deployment:
    # Automatic deployment from main branch
    auto_deploy: true
    
    # Deployment strategy
    strategy:
      type: RollingUpdate
      rolling_update:
        max_surge: 1
        max_unavailable: 0
    
    # Deployment timeout
    timeout_sec: 600
  
  # Advanced Settings
  advanced_settings:
    # Network
    network:
      ingress:
        enabled: true
        generate_certificate: true
        custom_domains:
          - domain: api.cinma.online
            generate_certificate: true
    
    # Deployment
    deployment:
      termination_grace_period_seconds: 30
      update_strategy:
        type: RollingUpdate
        rolling_update:
          max_surge: 1
          max_unavailable: 0
    
    # Security
    security:
      service_account_name: cinma-online-backend
      read_only_root_filesystem: false
      run_as_non_root: true
      run_as_user: 1000

# Notes:
# 1. All secrets must be configured in Qovery Console
# 2. Health check endpoint /health must return 200 OK when healthy
# 3. Database connection is tested in health check
# 4. Auto-scaling based on CPU usage (70% threshold)
# 5. Rolling updates ensure zero downtime
# 6. Graceful shutdown with 30 seconds termination grace period
