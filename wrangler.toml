# Cloudflare Pages Configuration for cinma.online
# This file configures the deployment settings for the frontend application

name = "cinma-online"
compatibility_date = "2024-01-01"

# Pages Configuration
[build]
command = "npm run build"
cwd = "."
watch_dir = "src"

[build.upload]
format = "directory"
dir = "dist"

# Environment Variables (set these in Cloudflare Pages dashboard)
# Required variables:
# - VITE_SITE_NAME
# - VITE_DOMAIN
# - VITE_SITE_URL
# - VITE_API_URL
# - VITE_API_BASE
# - VITE_API_KEY
# - VITE_SUPABASE_URL
# - VITE_SUPABASE_ANON_KEY
# - VITE_TMDB_API_KEY
# - VITE_GEMINI_API_KEY
# - VITE_GROQ_API_KEY
# - VITE_SENTRY_DSN

# SPA Routing Configuration
# Redirect all routes to index.html for client-side routing
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Security Headers
[build.processing]
css = true
js = true
html = true
minify = true

# Custom Headers for Security
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "SAMEORIGIN"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache Headers for Static Assets
[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.js"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.css"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.woff2"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.woff"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.ttf"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Images Cache
[[headers]]
for = "/*.png"
[headers.values]
Cache-Control = "public, max-age=2592000"

[[headers]]
for = "/*.jpg"
[headers.values]
Cache-Control = "public, max-age=2592000"

[[headers]]
for = "/*.jpeg"
[headers.values]
Cache-Control = "public, max-age=2592000"

[[headers]]
for = "/*.webp"
[headers.values]
Cache-Control = "public, max-age=2592000"

[[headers]]
for = "/*.svg"
[headers.values]
Cache-Control = "public, max-age=2592000"

# HTML - No Cache
[[headers]]
for = "/*.html"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

# Service Worker - No Cache
[[headers]]
for = "/sw.js"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

# Manifest - Short Cache
[[headers]]
for = "/manifest.json"
[headers.values]
Cache-Control = "public, max-age=3600"

# Node.js Version
[vars]
NODE_VERSION = "20"
